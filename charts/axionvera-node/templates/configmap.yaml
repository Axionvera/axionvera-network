apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "axionvera-node.configmapName" . }}
  labels:
    {{ include "axionvera-node.labels" . | nindent 4 }}
data:
  config.toml: |
    [server]
    host = "{{ .Values.config.server.host }}"
    port = {{ .Values.config.server.port }}

    [rpc]
    enabled = {{ .Values.config.rpc.enabled }}
    port = {{ .Values.config.rpc.port }}

    [p2p]
    enabled = {{ .Values.config.p2p.enabled }}
    port = {{ .Values.config.p2p.port }}
    bootstrap_nodes = [{{- range $i, $node := .Values.config.p2p.bootstrap_nodes }}{{ if $i }}, {{ end }}"{{ $node }}"{{- end }}]

    [metrics]
    enabled = {{ .Values.config.metrics.enabled }}
    port = {{ .Values.config.metrics.port }}
    path = "{{ .Values.config.metrics.path }}"

    [logging]
    level = "{{ .Values.config.logging.level }}"
    format = "{{ .Values.config.logging.format }}"

    [transaction_queue]
    max_size = {{ .Values.config.transaction_queue.max_size }}
    batch_size = {{ .Values.config.transaction_queue.batch_size }}
    timeout_ms = {{ .Values.config.transaction_queue.timeout_ms }}
