apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "axionvera-node.fullname" . }}
  labels:
    {{ include "axionvera-node.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{ include "axionvera-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{ include "axionvera-node.labels" . | nindent 8 }}
      annotations:
        {{ toYaml .Values.service.annotations | nindent 8 }}
    spec:
      securityContext:
        {{ toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "axionvera-node.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.http }}
              protocol: TCP
            - name: rpc
              containerPort: {{ .Values.service.ports.rpc }}
              protocol: TCP
            - name: p2p
              containerPort: {{ .Values.service.ports.p2p }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "{{ .Values.config.logging.level }}"
            - name: METRICS_ENABLED
              value: "{{ ternary "true" "false" .Values.config.metrics.enabled }}"
            - name: METRICS_PORT
              value: "{{ .Values.config.metrics.port }}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{ toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
          securityContext:
            {{ toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "axionvera-node.configmapName" . }}
        - name: logs
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
